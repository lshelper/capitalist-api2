services:
  php:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/cache
      CAPITALIST_API2_KEY: ${CAPITALIST_API2_KEY:-}
      CAPITALIST_API2_SECRET: ${CAPITALIST_API2_SECRET:-}

volumes:
  composer-cache:
